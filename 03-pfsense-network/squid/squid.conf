# =============================================================================
# Squid Configuration — SOC Lab Secure Web Gateway
# Replaces: Netskope Secure Web Gateway
# Deploy to: pfSense via Services → Squid → Advanced → Custom Options
# Or directly to /usr/local/etc/squid/squid.conf
# =============================================================================

# --- Network Access Control ---
http_port 3128

# SSL intercept (transparent + bump)
https_port 3129 intercept ssl-bump \
    cert=/usr/local/etc/squid/certs/SOC-Lab-CA.pem \
    key=/usr/local/etc/squid/certs/SOC-Lab-CA.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

# --- SSL Bump Policy ---
# Step 1: Peek at SNI
acl step1 at_step SslBump1
ssl_bump peek step1

# Always splice (allow through) trusted destinations
acl trusted_sites ssl::server_name .microsoft.com
acl trusted_sites ssl::server_name .windows.com
acl trusted_sites ssl::server_name .apple.com
acl trusted_sites ssl::server_name .ubuntu.com
acl trusted_sites ssl::server_name .debian.org
ssl_bump splice trusted_sites

# Bump (inspect) everything else
ssl_bump bump all

# Trust our own CA
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB

# --- ACLs ---
acl localnet src 192.168.10.0/24  # Management
acl localnet src 192.168.30.0/24  # Target VMs

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21      # FTP
acl Safe_ports port 443     # HTTPS
acl Safe_ports port 70      # Gopher
acl Safe_ports port 210     # WAIS
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Block non-standard ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# --- Blocklists (Threat Intel) ---
acl blocklist_domains dstdomain "/usr/local/etc/squid/blocklist-domains.txt"
acl blocklist_ips dst "/usr/local/etc/squid/blocklist-ips.txt"

# Block known malicious domains and IPs
http_access deny blocklist_domains
http_access deny blocklist_ips

# --- Category Filtering ---
# Block known bad URL patterns
acl bad_patterns url_regex -i "/usr/local/etc/squid/bad-patterns.txt"
http_access deny bad_patterns

# --- Tor Blocking ---
acl tor_ports port 9001 9030 9050 9051 9150
http_access deny tor_ports

# --- Data Loss Prevention (Basic) ---
# Block uploading to file sharing sites
acl file_sharing dstdomain .pastebin.com .mega.nz .wetransfer.com .sendspace.com
acl upload_method method POST PUT
http_access deny file_sharing upload_method

# --- Allow authenticated users ---
http_access allow localnet
http_access deny all

# --- Logging (Wazuh compatible format) ---
logformat squid_soc %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log squid_soc

# --- Cache Settings ---
cache_mem 256 MB
maximum_object_size_in_memory 512 KB
cache_dir ufs /var/cache/squid 1024 16 256
maximum_object_size 50 MB
cache_replacement_policy heap LFUDA

# --- Performance ---
dns_nameservers 8.8.8.8 1.1.1.1
negative_ttl 1 minute
forward_timeout 4 minutes
connect_timeout 1 minute
read_timeout 15 minutes
request_timeout 5 minutes

# --- Headers ---
# Remove identifying headers (privacy)
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
forwarded_for off

# Add custom header to track proxied traffic
request_header_add X-SOC-Lab-Proxy "Inspected" all
