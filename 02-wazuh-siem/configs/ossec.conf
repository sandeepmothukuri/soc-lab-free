<!-- Wazuh Manager Configuration — SOC Lab -->
<!-- /var/ossec/etc/ossec.conf on Wazuh Server -->
<ossec_config>

  <!-- ============================================================ -->
  <!--  GLOBAL SETTINGS                                             -->
  <!-- ============================================================ -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wiz.lab</smtp_server>
    <email_from>wazuh@soc.lab</email_from>
    <email_to>soc-analyst@example.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ============================================================ -->
  <!--  ALERTS CONFIGURATION                                        -->
  <!-- ============================================================ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ============================================================ -->
  <!--  ACTIVE RESPONSE — Auto-Block Attackers                      -->
  <!-- ============================================================ -->
  <command>
    <name>disable-account</name>
    <executable>disable-account</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>host-deny</name>
    <executable>host-deny</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Block SSH brute force after 8 failures — blocks for 3600s -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5763</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- Block web brute force -->
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>31151</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- ============================================================ -->
  <!--  REMOTE SYSLOG COLLECTION                                    -->
  <!-- ============================================================ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>192.168.10.0/24</allowed-ips>
    <allowed-ips>192.168.30.0/24</allowed-ips>
  </remote>

  <!-- ============================================================ -->
  <!--  FILE INTEGRITY MONITORING — Manager Itself                  -->
  <!-- ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories realtime="yes" report_changes="yes" check_all="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/usr/bin,/usr/sbin</directories>
    <directories realtime="yes" check_all="yes">/bin,/sbin</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
  </syscheck>

  <!-- ============================================================ -->
  <!--  ROOTCHECK                                                   -->
  <!-- ============================================================ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <system_audit>etc/shared/system_audit_rcl.txt</system_audit>
    <system_audit>etc/shared/system_audit_ssh.txt</system_audit>
    <system_audit>etc/shared/cis_debian_linux_rcl.txt</system_audit>
  </rootcheck>

  <!-- ============================================================ -->
  <!--  VULNERABILITY DETECTION (CIS Benchmarks)                   -->
  <!-- ============================================================ -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- ============================================================ -->
  <!--  POLICY MONITORING (CIS Benchmarks)                         -->
  <!-- ============================================================ -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ============================================================ -->
  <!--  LOG ANALYSIS — Manager Local Logs                          -->
  <!-- ============================================================ -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ============================================================ -->
  <!--  AGENT GROUPS CONFIGURATION                                  -->
  <!-- ============================================================ -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>

  <!-- ============================================================ -->
  <!--  CLUSTER (Single-node for lab)                              -->
  <!-- ============================================================ -->
  <cluster>
    <name>wazuh</name>
    <node_name>wazuh-manager</node_name>
    <node_type>master</node_type>
    <key>c98b62a9993d8f7c054eaaa68d8dbc88</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh-manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

</ossec_config>
